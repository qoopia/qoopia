<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Qoopia — Persistent Memory for AI Agents</title>
<style>
  :root {
    --bg: #0A1628;
    --surface: #111D33;
    --border: #1A2A44;
    --text: #F0EDE8;
    --text-dim: #8899AA;
    --accent: #3B82F6;
    --amber: #F59E0B;
    --green: #22C55E;
    --red: #EF4444;
    --radius: 12px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'SF Pro Display', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* === ANIMATIONS === */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }
  @keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }

  .fade-up {
    opacity: 0;
    animation: fadeUp 0.6s ease-out forwards;
  }

  .skeleton {
    background: linear-gradient(90deg, var(--surface) 25%, var(--border) 50%, var(--surface) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: 8px;
  }

  /* === HEADER === */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 24px 40px;
    border-bottom: 1px solid var(--border);
    animation: fadeUp 0.4s ease-out;
  }

  .logo-group {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .logo-group svg { width: 42px; height: 42px; }

  .brand {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, var(--text), var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .tagline {
    color: var(--text-dim);
    font-size: 14px;
    letter-spacing: 0.5px;
  }

  /* === MAIN === */
  main { padding: 32px 40px; max-width: 1400px; margin: 0 auto; }

  /* === METRIC CARDS === */
  .metrics {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    margin-bottom: 36px;
  }

  .metric-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
    cursor: default;
  }

  .metric-card:hover {
    transform: translateY(-2px);
    border-color: var(--accent);
    box-shadow: 0 8px 32px rgba(59,130,246,0.1);
  }

  .metric-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), transparent);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .metric-card:hover::before { opacity: 1; }

  .metric-icon {
    width: 40px; height: 40px;
    border-radius: 10px;
    background: rgba(59,130,246,0.1);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 16px;
  }

  .metric-icon svg { width: 20px; height: 20px; stroke: var(--accent); fill: none; stroke-width: 2; }

  .metric-value {
    font-size: 36px;
    font-weight: 800;
    letter-spacing: -1px;
    line-height: 1;
    margin-bottom: 6px;
  }

  .metric-label {
    font-size: 13px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .metric-breakdown {
    margin-top: 12px;
    display: flex;
    gap: 12px;
    font-size: 12px;
  }
  .metric-breakdown span { color: var(--text-dim); }
  .metric-breakdown .open { color: var(--amber); }
  .metric-breakdown .progress { color: var(--accent); }
  .metric-breakdown .done { color: var(--green); }

  /* === CONTENT GRID === */
  .content-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
  }

  @media (max-width: 900px) {
    .content-grid { grid-template-columns: 1fr; }
    header { padding: 20px; flex-direction: column; gap: 8px; }
    main { padding: 20px; }
  }

  /* === PANELS === */
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .panel-header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .panel-title {
    font-size: 16px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .panel-title::before {
    content: '';
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    display: inline-block;
    animation: pulse 2s infinite;
  }

  /* === TABS === */
  .tabs {
    display: flex;
    gap: 4px;
    padding: 4px;
    background: var(--bg);
    border-radius: 8px;
  }

  .tab {
    padding: 6px 14px;
    font-size: 12px;
    border: none;
    background: none;
    color: var(--text-dim);
    cursor: pointer;
    border-radius: 6px;
    transition: all 0.2s;
    font-family: inherit;
  }

  .tab.active {
    background: var(--accent);
    color: white;
  }

  .tab:hover:not(.active) { color: var(--text); }

  /* === ACTIVITY FEED === */
  .activity-list { max-height: 500px; overflow-y: auto; }

  .activity-item {
    padding: 16px 24px;
    border-bottom: 1px solid rgba(26,42,68,0.5);
    display: flex;
    gap: 12px;
    align-items: flex-start;
    transition: background 0.2s;
  }

  .activity-item:hover { background: rgba(59,130,246,0.03); }
  .activity-item:last-child { border-bottom: none; }

  .activity-avatar {
    width: 32px; height: 32px;
    border-radius: 8px;
    background: linear-gradient(135deg, var(--accent), #6366F1);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    flex-shrink: 0;
    color: white;
  }

  .activity-content { flex: 1; min-width: 0; }
  .activity-actor { font-weight: 600; font-size: 13px; }
  .activity-action { font-size: 13px; color: var(--text-dim); margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .activity-time { font-size: 11px; color: var(--text-dim); margin-top: 4px; opacity: 0.6; }

  /* === TASK LIST === */
  .task-list { max-height: 500px; overflow-y: auto; }

  .task-item {
    padding: 16px 24px;
    border-bottom: 1px solid rgba(26,42,68,0.5);
    transition: background 0.2s;
    cursor: default;
  }

  .task-item:hover { background: rgba(59,130,246,0.03); }
  .task-item:last-child { border-bottom: none; }

  .task-title { font-size: 14px; font-weight: 500; margin-bottom: 8px; }

  .task-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 12px;
  }

  .badge {
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .badge-open { background: rgba(245,158,11,0.15); color: var(--amber); }
  .badge-in_progress { background: rgba(59,130,246,0.15); color: var(--accent); }
  .badge-done { background: rgba(34,197,94,0.15); color: var(--green); }
  .badge-blocked { background: rgba(239,68,68,0.15); color: var(--red); }

  .task-project { color: var(--text-dim); }
  .task-due { color: var(--text-dim); }

  /* === EMPTY STATE === */
  .empty-state {
    padding: 48px 24px;
    text-align: center;
    color: var(--text-dim);
    font-size: 14px;
  }

  /* === FOOTER === */
  footer {
    text-align: center;
    padding: 40px;
    color: var(--text-dim);
    font-size: 13px;
    opacity: 0.5;
  }

  /* === SCROLLBAR === */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

  /* === ERROR === */
  .error-banner {
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.3);
    color: var(--red);
    padding: 12px 24px;
    border-radius: var(--radius);
    margin-bottom: 24px;
    font-size: 14px;
    display: none;
  }
</style>
</head>
<body>

<header>
  <div class="logo-group">
    <svg viewBox="0 0 200 200" width="42" height="42">
      <defs>
        <mask id="qm"><rect width="200" height="200" fill="white"/><circle cx="100" cy="90" r="36" fill="black"/></mask>
      </defs>
      <circle cx="100" cy="90" r="70" fill="#F0EDE8" mask="url(#qm)"/>
      <line x1="120" y1="130" x2="155" y2="170" stroke="#F0EDE8" stroke-width="16" stroke-linecap="round"/>
      <line x1="145" y1="158" x2="168" y2="155" stroke="#F0EDE8" stroke-width="6" stroke-linecap="round"/>
      <line x1="145" y1="158" x2="162" y2="175" stroke="#F0EDE8" stroke-width="6" stroke-linecap="round"/>
      <circle cx="100" cy="90" r="8" fill="#3B82F6"/>
      <circle cx="100" cy="68" r="3" fill="#F0EDE8" opacity="0.4"/>
      <circle cx="118" cy="82" r="3" fill="#F0EDE8" opacity="0.4"/>
      <circle cx="85" cy="98" r="3" fill="#F0EDE8" opacity="0.4"/>
      <line x1="100" y1="82" x2="100" y2="71" stroke="#F0EDE8" stroke-width="1" opacity="0.25"/>
      <line x1="107" y1="86" x2="115" y2="83" stroke="#F0EDE8" stroke-width="1" opacity="0.25"/>
      <line x1="93" y1="94" x2="88" y2="97" stroke="#F0EDE8" stroke-width="1" opacity="0.25"/>
      <circle cx="168" cy="155" r="4" fill="#F0EDE8" opacity="0.5"/>
      <circle cx="162" cy="175" r="4" fill="#F0EDE8" opacity="0.5"/>
    </svg>
    <span class="brand">Qoopia</span>
  </div>
  <span class="tagline">Persistent memory for AI agents</span>
</header>

<main>
  <div id="error-banner" class="error-banner"></div>

  <div class="metrics" id="metrics">
    <div class="metric-card fade-up" style="animation-delay:0.1s">
      <div class="metric-icon"><svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <div class="metric-value" id="tasks-count">—</div>
      <div class="metric-label">Tasks</div>
      <div class="metric-breakdown">
        <span class="open" id="tasks-open">— open</span>
        <span class="progress" id="tasks-progress">— active</span>
        <span class="done" id="tasks-done">— done</span>
      </div>
    </div>
    <div class="metric-card fade-up" style="animation-delay:0.2s">
      <div class="metric-icon"><svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <div class="metric-value" id="deals-count">—</div>
      <div class="metric-label">Deals</div>
    </div>
    <div class="metric-card fade-up" style="animation-delay:0.3s">
      <div class="metric-icon"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4-4v2M9 7a4 4 0 100-8 4 4 0 000 8zM23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <div class="metric-value" id="contacts-count">—</div>
      <div class="metric-label">Contacts</div>
    </div>
    <div class="metric-card fade-up" style="animation-delay:0.4s">
      <div class="metric-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" stroke-linecap="round"/></svg></div>
      <div class="metric-value" id="agents-count">—</div>
      <div class="metric-label">Agents</div>
    </div>
  </div>

  <div class="content-grid">
    <!-- Activity Feed -->
    <div class="panel fade-up" style="animation-delay:0.5s">
      <div class="panel-header">
        <div class="panel-title">Activity Feed</div>
      </div>
      <div class="activity-list" id="activity-list">
        <div class="empty-state">Loading activity...</div>
      </div>
    </div>

    <!-- Tasks -->
    <div class="panel fade-up" style="animation-delay:0.6s">
      <div class="panel-header">
        <div class="panel-title">Tasks</div>
        <div class="tabs">
          <button class="tab active" data-filter="all">All</button>
          <button class="tab" data-filter="open">Open</button>
          <button class="tab" data-filter="in_progress">Active</button>
          <button class="tab" data-filter="done">Done</button>
        </div>
      </div>
      <div class="task-list" id="task-list">
        <div class="empty-state">Loading tasks...</div>
      </div>
    </div>
  </div>
</main>

<footer>Qoopia © 2026 — құпия means secret</footer>

<script>
  const API = '';
  let token = null;
  let allTasks = [];

  async function auth() {
    try {
      const res = await fetch(`${API}/oauth/token`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ grant_type: 'client_credentials', client_id: 'dashboard', client_secret: 'dashboard' })
      });
      if (!res.ok) throw new Error(`Auth failed: ${res.status}`);
      const data = await res.json();
      token = data.access_token;
    } catch (e) {
      showError('Authentication failed: ' + e.message);
      throw e;
    }
  }

  async function api(path) {
    const res = await fetch(`${API}${path}`, {
      headers: { 'Authorization': `Bearer ${token}` }
    });
    if (!res.ok) throw new Error(`API ${path}: ${res.status}`);
    return res.json();
  }

  function showError(msg) {
    const el = document.getElementById('error-banner');
    el.textContent = msg;
    el.style.display = 'block';
  }

  function timeAgo(ts) {
    const diff = Date.now() - new Date(ts).getTime();
    const mins = Math.floor(diff / 60000);
    if (mins < 1) return 'just now';
    if (mins < 60) return `${mins}m ago`;
    const hrs = Math.floor(mins / 60);
    if (hrs < 24) return `${hrs}h ago`;
    const days = Math.floor(hrs / 24);
    return `${days}d ago`;
  }

  function initials(name) {
    if (!name) return '?';
    return name.split(/[-_ ]/).map(w => w[0] || '').join('').toUpperCase().slice(0, 2);
  }

  async function loadMetrics() {
    try {
      const [tasks, deals, contacts, agents] = await Promise.all([
        api('/api/v1/tasks'),
        api('/api/v1/deals'),
        api('/api/v1/contacts'),
        api('/api/v1/agents')
      ]);

      allTasks = Array.isArray(tasks) ? tasks : (tasks.data || []);
      const d = Array.isArray(deals) ? deals : (deals.data || []);
      const c = Array.isArray(contacts) ? contacts : (contacts.data || []);
      const a = Array.isArray(agents) ? agents : (agents.data || []);

      const open = allTasks.filter(t => t.status === 'open').length;
      const prog = allTasks.filter(t => t.status === 'in_progress').length;
      const done = allTasks.filter(t => t.status === 'done').length;

      document.getElementById('tasks-count').textContent = allTasks.length;
      document.getElementById('tasks-open').textContent = `${open} open`;
      document.getElementById('tasks-progress').textContent = `${prog} active`;
      document.getElementById('tasks-done').textContent = `${done} done`;
      document.getElementById('deals-count').textContent = d.length;
      document.getElementById('contacts-count').textContent = c.length;
      document.getElementById('agents-count').textContent = a.length;
    } catch (e) {
      showError('Failed to load metrics: ' + e.message);
    }
  }

  async function loadActivity() {
    try {
      const data = await api('/api/v1/activity?limit=20');
      const items = Array.isArray(data) ? data : (data.data || []);
      const container = document.getElementById('activity-list');

      if (items.length === 0) {
        container.innerHTML = '<div class="empty-state">No activity yet</div>';
        return;
      }

      container.innerHTML = items.map(a => `
        <div class="activity-item">
          <div class="activity-avatar">${initials(a.actor || a.agent_id || 'sys')}</div>
          <div class="activity-content">
            <div class="activity-actor">${a.actor || a.agent_id || 'system'}</div>
            <div class="activity-action">${a.action || a.type || ''} ${a.entity_type ? `· ${a.entity_type}` : ''} ${a.description || a.details || ''}</div>
            <div class="activity-time">${timeAgo(a.created_at || a.timestamp)}</div>
          </div>
        </div>
      `).join('');
    } catch (e) {
      document.getElementById('activity-list').innerHTML = '<div class="empty-state">Failed to load activity</div>';
    }
  }

  function renderTasks(filter) {
    const container = document.getElementById('task-list');
    let tasks = allTasks;
    if (filter && filter !== 'all') {
      tasks = allTasks.filter(t => t.status === filter);
    }

    if (tasks.length === 0) {
      container.innerHTML = '<div class="empty-state">No tasks found</div>';
      return;
    }

    container.innerHTML = tasks.map(t => `
      <div class="task-item">
        <div class="task-title">${t.title || t.name || 'Untitled'}</div>
        <div class="task-meta">
          <span class="badge badge-${t.status || 'open'}">${(t.status || 'open').replace('_', ' ')}</span>
          ${t.project_id ? `<span class="task-project">${t.project_name || t.project_id}</span>` : ''}
          ${t.due_date ? `<span class="task-due">Due: ${new Date(t.due_date).toLocaleDateString()}</span>` : ''}
        </div>
      </div>
    `).join('');
  }

  // Tab switching
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      renderTasks(tab.dataset.filter);
    });
  });

  // Init
  (async () => {
    await auth();
    await Promise.all([loadMetrics(), loadActivity()]);
    renderTasks('all');
  })();
</script>
</body>
</html>
