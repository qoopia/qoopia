<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Qoopia — Agent Monitor</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%230f172a'/><circle cx='16' cy='16' r='8' fill='none' stroke='%236366f1' stroke-width='2.5'/><circle cx='16' cy='16' r='3' fill='%236366f1'/></svg>">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0a0e1a;
  --surface: #111827;
  --surface2: #1e293b;
  --surface3: #273449;
  --border: #1e293b;
  --border-hover: #334155;
  --text: #f1f5f9;
  --text2: #94a3b8;
  --text3: #64748b;
  --accent: #6366f1;
  --accent-hover: #7c7fff;
  --accent-dim: rgba(99,102,241,.12);
  --green: #22c55e;
  --green-dim: rgba(34,197,94,.14);
  --amber: #f59e0b;
  --amber-dim: rgba(245,158,11,.14);
  --red: #ef4444;
  --red-dim: rgba(239,68,68,.14);
  --purple: #a855f7;
  --purple-dim: rgba(168,85,247,.14);
  --blue: #3b82f6;
  --blue-dim: rgba(59,130,246,.14);
  --pink: #ec4899;
  --pink-dim: rgba(236,72,153,.14);
  --cyan: #06b6d4;
  --cyan-dim: rgba(6,182,212,.14);
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  --mono: 'SF Mono', 'JetBrains Mono', ui-monospace, monospace;
}

html { font-size: 15px; }
html, body { overflow-x: hidden; max-width: 100%; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  width: 100%;
}

/* ---- Login ---- */
.login-wrap {
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh; padding: 24px;
}
.login-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 44px 36px;
  max-width: 380px; width: 100%; text-align: center;
}
.login-logo {
  width: 48px; height: 48px; border-radius: 14px;
  background: var(--accent-dim);
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 18px;
  font-size: 24px;
}
.login-title { font-size: 1.2rem; font-weight: 600; margin-bottom: 6px; }
.login-sub { color: var(--text3); font-size: .85rem; margin-bottom: 24px; }
.login-input {
  width: 100%; padding: 12px 14px;
  border-radius: 8px; border: 1px solid var(--border);
  background: var(--bg); color: var(--text);
  font-size: .9rem; font-family: var(--mono);
  outline: none;
}
.login-input:focus { border-color: var(--accent); }
.login-btn {
  width: 100%; margin-top: 12px; padding: 12px;
  background: var(--accent); border: 0; border-radius: 8px;
  color: #fff; font-weight: 600; cursor: pointer;
  font-size: .9rem;
}
.login-btn:hover { background: var(--accent-hover); }
.login-btn:disabled { opacity: .6; cursor: not-allowed; }
.login-err {
  display: none; color: var(--red);
  font-size: .8rem; margin-top: 10px;
}

/* ---- App layout ---- */
.app { display: none; min-height: 100vh; }
.topbar {
  display: flex; align-items: center; gap: 16px;
  padding: 14px 24px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  position: sticky; top: 0; z-index: 10;
  flex-wrap: wrap;
  max-width: 100%;
}
.brand {
  display: flex; align-items: center; gap: 10px;
  font-weight: 600; font-size: 1rem;
}
.brand .dot {
  width: 10px; height: 10px; border-radius: 50%;
  background: var(--accent);
}
.crumb {
  color: var(--text3); font-size: .9rem;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  min-width: 0; flex: 1 1 auto;
}
.crumb a {
  color: var(--text2); text-decoration: none; cursor: pointer;
}
.crumb a:hover { color: var(--text); }
.crumb-sep { margin: 0 8px; color: var(--text3); }
.spacer { flex: 1; }
.conn {
  display: flex; align-items: center; gap: 6px;
  color: var(--text3); font-size: .78rem;
}
.conn-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--green);
}
.conn-dot.off { background: var(--red); }
.icon-btn {
  background: transparent; color: var(--text2);
  border: 1px solid var(--border); border-radius: 8px;
  padding: 6px 10px; font-size: .8rem; cursor: pointer;
  font-family: var(--font);
}
.icon-btn:hover { border-color: var(--border-hover); color: var(--text); }

.content { padding: 32px 24px; max-width: 1280px; margin: 0 auto; width: 100%; }

/* ---- Agent grid ---- */
.section-title {
  font-size: .75rem; font-weight: 600; color: var(--text3);
  text-transform: uppercase; letter-spacing: .06em;
  margin-bottom: 14px;
}
.agent-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 16px;
}
.agent-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 20px;
  cursor: pointer;
  transition: border-color .15s, transform .15s;
}
.agent-card:hover {
  border-color: var(--border-hover);
  transform: translateY(-2px);
}
.agent-head {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 14px;
}
.agent-avatar {
  width: 40px; height: 40px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 1rem;
}
.agent-name { font-weight: 600; font-size: 1.05rem; }
.agent-meta { font-size: .75rem; color: var(--text3); }
.live-dot {
  display: inline-block; width: 8px; height: 8px; border-radius: 50%;
  background: var(--red); margin-right: 6px; vertical-align: middle;
  animation: pulse 1.6s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(239,68,68,.5); }
  50%      { opacity: .6; box-shadow: 0 0 0 6px rgba(239,68,68,0); }
}
.recent-dot {
  display: inline-block; width: 8px; height: 8px; border-radius: 50%;
  background: var(--green); margin-right: 6px; vertical-align: middle;
}
.agent-stats {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 8px; margin-top: 14px;
}
.stat {
  padding: 8px; border-radius: 8px;
  background: var(--bg);
}
.stat-val {
  font-size: 1.15rem; font-weight: 600; color: var(--text);
  font-variant-numeric: tabular-nums;
}
.stat-lbl {
  font-size: .68rem; color: var(--text3);
  text-transform: uppercase; letter-spacing: .04em;
}

/* System agents — dimmed */
.system-grid .agent-card { opacity: .72; }
.system-grid .agent-card:hover { opacity: 1; }

/* Agent color variants */
.agent-avatar.alan { background: var(--accent-dim); color: var(--accent); }
.agent-avatar.aizek { background: var(--green-dim); color: var(--green); }
.agent-avatar.aidan { background: var(--amber-dim); color: var(--amber); }
.agent-avatar.dan { background: var(--pink-dim); color: var(--pink); }
.agent-avatar.other { background: var(--surface2); color: var(--text2); }

/* ---- Detail view ---- */
.detail-head {
  display: flex; align-items: center; gap: 14px;
  margin-bottom: 20px;
}
.detail-head .agent-avatar { width: 48px; height: 48px; font-size: 1.15rem; }
.detail-title { font-size: 1.3rem; font-weight: 600; }
.detail-sub { font-size: .85rem; color: var(--text3); margin-top: 2px; }

.tabs {
  display: flex; gap: 2px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 20px;
}
.tab {
  padding: 10px 16px; background: transparent;
  border: 0; color: var(--text2);
  font-size: .88rem; font-weight: 500;
  cursor: pointer; border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  font-family: var(--font);
}
.tab:hover { color: var(--text); }
.tab.active {
  color: var(--accent); border-bottom-color: var(--accent);
}
.tab-badge {
  display: inline-block; margin-left: 6px;
  padding: 1px 7px; border-radius: 10px;
  background: var(--surface2); color: var(--text2);
  font-size: .7rem; font-variant-numeric: tabular-nums;
}
.tab.active .tab-badge {
  background: var(--accent-dim); color: var(--accent);
}

/* ---- Sessions list ---- */
.sess-list { display: flex; flex-direction: column; gap: 8px; }
.sess-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 16px;
  cursor: pointer;
  display: flex; align-items: center; gap: 12px;
}
.sess-item:hover { border-color: var(--border-hover); }
.sess-info { flex: 1; min-width: 0; overflow: hidden; }
.sess-id {
  font-family: var(--mono); font-size: .78rem;
  color: var(--text2);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  max-width: 100%;
}
.sess-title {
  font-size: .9rem; color: var(--text); margin-top: 2px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.sess-badges {
  display: flex; gap: 8px; font-size: .72rem;
  color: var(--text3);
}
.sess-badge {
  padding: 2px 8px; border-radius: 10px;
  background: var(--surface2);
}
.sess-chev { color: var(--text3); font-size: 1.2rem; }
.copyable { cursor: pointer; user-select: all; }
.copyable:hover { color: var(--accent); }
.copyable.flash { color: var(--green) !important; transition: color .3s; }

/* ---- Session transcript ---- */
.transcript { display: flex; flex-direction: column; gap: 10px; }
.msg {
  border: 1px solid var(--border);
  border-radius: 10px; padding: 12px 14px;
  background: var(--surface);
}
.msg.user { border-left: 3px solid var(--accent); }
.msg.assistant { border-left: 3px solid var(--green); }
.msg.system { border-left: 3px solid var(--text3); }
.msg.tool { border-left: 3px solid var(--amber); }
.msg-head {
  display: flex; align-items: center; gap: 10px;
  font-size: .72rem; color: var(--text3);
  margin-bottom: 6px;
}
.msg-role {
  text-transform: uppercase; letter-spacing: .05em;
  font-weight: 600; color: var(--text2);
}
.msg-role.user { color: var(--accent); }
.msg-role.assistant { color: var(--green); }
.msg-role.tool { color: var(--amber); }
.msg-content {
  font-size: .85rem; line-height: 1.55;
  white-space: pre-wrap; word-break: break-word;
  overflow-wrap: anywhere;
  font-family: var(--mono);
  color: var(--text);
  max-height: 400px; overflow: auto;
  max-width: 100%;
}

/* ---- Notes/Memory ---- */
.note-filters {
  display: flex; gap: 6px; flex-wrap: wrap;
  margin-bottom: 16px;
}
.note-filter {
  padding: 5px 11px; border-radius: 16px;
  background: var(--surface); border: 1px solid var(--border);
  color: var(--text2); font-size: .78rem;
  cursor: pointer; font-family: var(--font);
}
.note-filter:hover { border-color: var(--border-hover); color: var(--text); }
.note-filter.active {
  background: var(--accent-dim); border-color: var(--accent);
  color: var(--accent);
}

.note-list { display: flex; flex-direction: column; gap: 10px; }
.note {
  background: var(--surface);
  border: 1px solid var(--border);
  border-left-width: 3px;
  border-radius: 10px; padding: 14px 16px;
}
.note-head {
  display: flex; align-items: center; gap: 10px;
  font-size: .72rem; color: var(--text3);
  margin-bottom: 6px;
}
.note-type {
  text-transform: uppercase; letter-spacing: .05em;
  font-weight: 600; font-size: .68rem;
  padding: 2px 8px; border-radius: 10px;
}
.note-text {
  font-size: .88rem; line-height: 1.55;
  white-space: pre-wrap; word-break: break-word;
  overflow-wrap: anywhere;
  color: var(--text);
  max-width: 100%;
}
.note-meta {
  margin-top: 8px; font-size: .72rem; color: var(--text3);
  font-family: var(--mono);
}

/* type color coding */
.t-rule      { border-left-color: var(--purple); }
.t-rule .note-type { background: var(--purple-dim); color: var(--purple); }
.t-memory    { border-left-color: var(--amber); }
.t-memory .note-type { background: var(--amber-dim); color: var(--amber); }
.t-decision  { border-left-color: var(--blue); }
.t-decision .note-type { background: var(--blue-dim); color: var(--blue); }
.t-knowledge { border-left-color: var(--cyan); }
.t-knowledge .note-type { background: var(--cyan-dim); color: var(--cyan); }
.t-task      { border-left-color: var(--green); }
.t-task .note-type { background: var(--green-dim); color: var(--green); }
.t-deal      { border-left-color: var(--pink); }
.t-deal .note-type { background: var(--pink-dim); color: var(--pink); }
.t-project   { border-left-color: var(--accent); }
.t-project .note-type { background: var(--accent-dim); color: var(--accent); }
.t-context   { border-left-color: var(--text3); }
.t-context .note-type { background: var(--surface2); color: var(--text2); }
.t-contact   { border-left-color: var(--blue); }
.t-contact .note-type { background: var(--blue-dim); color: var(--blue); }
.t-finance   { border-left-color: var(--green); }
.t-finance .note-type { background: var(--green-dim); color: var(--green); }
.t-note      { border-left-color: var(--text3); }
.t-note .note-type { background: var(--surface2); color: var(--text2); }

.empty {
  text-align: center; padding: 60px 20px;
  color: var(--text3); font-size: .9rem;
}

/* ---- Mobile ---- */
@media (max-width: 640px) {
  html { font-size: 14px; }
  .content { padding: 20px 14px; }
  .topbar { padding: 10px 14px; gap: 10px; }
  .spacer { display: none; }
  .conn { order: 99; }
  .agent-grid { grid-template-columns: 1fr; gap: 12px; }
  .agent-card { padding: 16px; }
  .agent-stats { gap: 6px; }
  .stat { padding: 6px; }
  .stat-val { font-size: 1rem; }
  .sess-item { padding: 12px 14px; gap: 10px; }
  .note { padding: 12px 14px; }
  .note-filters { gap: 5px; }
  .note-filter { padding: 4px 9px; font-size: .75rem; }
  .tabs { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .tab { flex-shrink: 0; padding: 10px 12px; }
  .detail-head { gap: 10px; }
  .detail-head .agent-avatar { width: 40px; height: 40px; }
  .detail-title { font-size: 1.1rem; }
  .detail-sub { font-size: .75rem; word-break: break-all; }
  .msg { padding: 10px 12px; }
  .msg-content { font-size: .8rem; }
  .icon-btn { padding: 5px 8px; font-size: .75rem; }
}
.loading {
  text-align: center; padding: 40px; color: var(--text3);
  font-size: .85rem;
}
.err {
  padding: 12px 16px; background: var(--red-dim);
  border: 1px solid var(--red); border-radius: 8px;
  color: var(--red); font-size: .85rem;
}
</style>
</head>
<body>

<!-- Login -->
<div class="login-wrap" id="loginView">
  <div class="login-card">
    <div class="login-logo">🔑</div>
    <div class="login-title">Qoopia Agent Monitor</div>
    <div class="login-sub">Paste any agent API key</div>
    <input type="password" id="tokenInput" class="login-input" placeholder="q_..." autofocus />
    <button class="login-btn" id="loginBtn">Open Dashboard</button>
    <div class="login-err" id="loginErr">Access denied</div>
  </div>
</div>

<!-- App -->
<div class="app" id="appView">
  <div class="topbar">
    <div class="brand"><span class="dot"></span>Qoopia</div>
    <div class="crumb" id="crumb"><a onclick="goHome()">Agents</a></div>
    <div class="spacer"></div>
    <div class="conn">
      <span class="conn-dot" id="connDot"></span>
      <span id="connText">Live</span>
    </div>
    <button class="icon-btn" onclick="loadView()">↻ Refresh</button>
    <button class="icon-btn" id="logoutBtn">Logout</button>
  </div>
  <div class="content" id="main"></div>
</div>

<script>
(function () {
  const BASE = window.location.origin;
  // QDASH-COOKIE: token is no longer stored in JS. Auth lives in an
  // HttpOnly cookie set by POST /api/dashboard/login. Every fetch goes
  // out with `credentials: 'same-origin'` so the cookie is included on
  // same-origin requests; the cookie itself is never readable from JS.
  let view = { kind: 'home' }; // home | agent | session
  let agentsCache = null;
  let pollTimer = null;

  const $ = (s) => document.querySelector(s);
  const main = $('#main');
  const crumb = $('#crumb');

  // ---- API ----
  async function api(path) {
    const r = await fetch(BASE + path, {
      credentials: 'same-origin',
    });
    if (r.status === 401) {
      showLogin();
      throw new Error('unauthorized');
    }
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return r.json();
  }

  // ---- Auth ----
  function showLogin() {
    $('#loginView').style.display = 'flex';
    $('#appView').style.display = 'none';
    stopPoll();
  }
  function showApp() {
    $('#loginView').style.display = 'none';
    $('#appView').style.display = 'block';
  }

  $('#loginBtn').onclick = async () => {
    const btn = $('#loginBtn');
    const inp = $('#tokenInput');
    const t = inp.value.trim();
    if (!t) return;
    btn.disabled = true;
    btn.textContent = 'Checking...';
    try {
      // Server validates the Bearer and replies with Set-Cookie. The token
      // value never enters sessionStorage / localStorage — once the call
      // returns we discard `t` and rely on the cookie for everything.
      const r = await fetch(BASE + '/api/dashboard/login', {
        method: 'POST',
        credentials: 'same-origin',
        headers: { 'Authorization': 'Bearer ' + t },
      });
      if (!r.ok) throw new Error('HTTP ' + r.status);
      // Wipe the input so the raw token does not linger in the DOM.
      inp.value = '';
      showApp();
      goHome();
    } catch (e) {
      $('#loginErr').style.display = 'block';
      inp.focus();
    } finally {
      btn.disabled = false;
      btn.textContent = 'Open Dashboard';
    }
  };
  $('#tokenInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') $('#loginBtn').click();
    $('#loginErr').style.display = 'none';
  });
  $('#logoutBtn').onclick = async () => {
    try {
      await fetch(BASE + '/api/dashboard/logout', {
        method: 'POST',
        credentials: 'same-origin',
      });
    } catch { /* ignore — logout is best-effort */ }
    showLogin();
  };

  // ---- Conn ----
  function setConn(ok) {
    $('#connDot').classList.toggle('off', !ok);
    $('#connText').textContent = ok ? 'Live' : 'Offline';
  }

  // ---- Utils ----
  function fmtTime(iso) {
    if (!iso) return '—';
    const d = new Date(iso);
    const now = Date.now();
    const diff = (now - d.getTime()) / 1000;
    if (diff < 60) return 'just now';
    if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
    if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
    if (diff < 86400 * 30) return Math.floor(diff / 86400) + 'd ago';
    return d.toLocaleDateString();
  }
  function fmtTimeFull(iso) {
    if (!iso) return '—';
    return new Date(iso).toLocaleString();
  }
  function esc(s) {
    return (s || '').replace(/[&<>"']/g, (c) => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;',
    })[c]);
  }
  function avatarClass(name) {
    const n = (name || '').toLowerCase();
    if (['alan','aizek','aidan','dan'].includes(n)) return n;
    return 'other';
  }
  function initial(name) {
    return (name || '?').charAt(0).toUpperCase();
  }

  // ---- Routing ----
  function goHome() {
    view = { kind: 'home' };
    crumb.innerHTML = '<a onclick="goHome()">Agents</a>';
    loadView();
  }
  window.goHome = goHome;

  function goAgent(agent) {
    view = { kind: 'agent', agent, tab: 'sessions', noteType: null };
    crumb.innerHTML =
      '<a onclick="goHome()">Agents</a><span class="crumb-sep">›</span>' +
      esc(agent.name);
    loadView();
  }

  function goSession(agent, session) {
    view = { kind: 'session', agent, session };
    crumb.innerHTML =
      '<a onclick="goHome()">Agents</a><span class="crumb-sep">›</span>' +
      '<a onclick="goBackAgent()">' + esc(agent.name) + '</a>' +
      '<span class="crumb-sep">›</span>' + esc(session.id.slice(0, 12));
    loadView();
  }
  window.goBackAgent = () => goAgent(view.agent);

  function stopPoll() { if (pollTimer) { clearInterval(pollTimer); pollTimer = null; } }
  function startPoll(fn) { stopPoll(); pollTimer = setInterval(fn, 5000); }

  // ---- Views ----
  async function loadView() {
    stopPoll();
    if (view.kind === 'home') return renderHome();
    if (view.kind === 'agent') return renderAgent();
    if (view.kind === 'session') return renderSession();
  }
  window.loadView = loadView;

  const LIVE_AGENTS = ['alan', 'aizek', 'aidan', 'dan'];
  const LIVE_ORDER = { alan: 0, aizek: 1, aidan: 2, dan: 3 };

  function liveStatus(iso) {
    if (!iso) return '';
    const diff = (Date.now() - new Date(iso).getTime()) / 1000;
    if (diff < 90) return '<span class="live-dot" title="active now"></span>';
    if (diff < 600) return '<span class="recent-dot" title="active recently"></span>';
    return '';
  }

  function renderCard(a) {
    const lastIso = a.last_session_active || a.last_seen;
    return `
      <div class="agent-card" data-id="${esc(a.id)}">
        <div class="agent-head">
          <div class="agent-avatar ${avatarClass(a.name)}">${initial(a.name)}</div>
          <div>
            <div class="agent-name">${liveStatus(lastIso)}${esc(a.name)}</div>
            <div class="agent-meta">last seen ${fmtTime(lastIso)}</div>
          </div>
        </div>
        <div class="agent-stats">
          <div class="stat"><div class="stat-val">${a.sessions_count}</div><div class="stat-lbl">Sessions</div></div>
          <div class="stat"><div class="stat-val">${a.messages_count}</div><div class="stat-lbl">Messages</div></div>
          <div class="stat"><div class="stat-val">${a.notes_count}</div><div class="stat-lbl">Notes</div></div>
        </div>
      </div>`;
  }

  async function renderHome() {
    if (!agentsCache) main.innerHTML = '<div class="loading">Loading agents…</div>';
    try {
      const data = await api('/api/dashboard/agents');
      agentsCache = data.items;
      setConn(true);
    } catch (e) { setConn(false); return; }

    const live = agentsCache
      .filter((a) => LIVE_AGENTS.includes((a.name || '').toLowerCase()))
      .sort((a, b) => (LIVE_ORDER[a.name.toLowerCase()] ?? 99) - (LIVE_ORDER[b.name.toLowerCase()] ?? 99));
    const sys = agentsCache
      .filter((a) => !LIVE_AGENTS.includes((a.name || '').toLowerCase()))
      .sort((a, b) => a.name.localeCompare(b.name));

    const html = [
      '<div class="section-title">Live agents · click to drill in</div>',
      '<div class="agent-grid">',
      ...live.map(renderCard),
      '</div>',
      sys.length ? `
        <div class="section-title" style="margin-top: 36px; color: var(--text3)">
          System agents · infra &amp; integrations
        </div>
        <div class="agent-grid system-grid">
          ${sys.map(renderCard).join('')}
        </div>` : '',
    ].join('');
    main.innerHTML = html;
    main.querySelectorAll('.agent-card').forEach((el) => {
      el.onclick = () => {
        const id = el.getAttribute('data-id');
        const a = agentsCache.find((x) => x.id === id);
        if (a) goAgent(a);
      };
    });
    startPoll(renderHome);
  }

  async function renderAgent() {
    const a = view.agent;
    main.innerHTML = `
      <div class="detail-head">
        <div class="agent-avatar ${avatarClass(a.name)}">${initial(a.name)}</div>
        <div>
          <div class="detail-title">${esc(a.name)}</div>
          <div class="detail-sub">${a.sessions_count} sessions · ${a.messages_count} messages · ${a.notes_count} notes</div>
        </div>
      </div>
      <div class="tabs">
        <button class="tab ${view.tab === 'sessions' ? 'active' : ''}" data-tab="sessions">
          Sessions <span class="tab-badge">${a.sessions_count}</span>
        </button>
        <button class="tab ${view.tab === 'memory' ? 'active' : ''}" data-tab="memory">
          Memory <span class="tab-badge">${a.notes_count}</span>
        </button>
        <button class="tab ${view.tab === 'search' ? 'active' : ''}" data-tab="search">
          Search
        </button>
      </div>
      <div id="tabBody"><div class="loading">Loading…</div></div>`;
    main.querySelectorAll('.tab').forEach((el) => {
      el.onclick = () => {
        view.tab = el.getAttribute('data-tab');
        renderAgent();
      };
    });
    if (view.tab === 'sessions') return renderSessions();
    if (view.tab === 'memory') return renderMemory();
    if (view.tab === 'search') return renderSearch();
  }

  async function renderSessions() {
    const a = view.agent;
    const body = $('#tabBody');
    try {
      const data = await api(`/api/dashboard/agents/${encodeURIComponent(a.id)}/sessions?limit=200`);
      setConn(true);
      if (!data.items.length) {
        body.innerHTML = '<div class="empty">No sessions yet.</div>';
        return;
      }
      body.innerHTML = '<div class="sess-list">' +
        data.items.map((s) => {
          const live = liveStatus(s.last_active);
          return `
          <div class="sess-item" data-id="${esc(s.id)}">
            <div class="sess-info">
              <div class="sess-title">${live}${esc(s.title || '(untitled)')}</div>
              <div class="sess-id">${esc(s.id)}</div>
            </div>
            <div class="sess-badges">
              <span class="sess-badge">${s.message_count} msgs</span>
              <span class="sess-badge">${fmtTime(s.last_active)}</span>
            </div>
            <div class="sess-chev">›</div>
          </div>`;
        }).join('') + '</div>';
      body.querySelectorAll('.sess-item').forEach((el) => {
        el.onclick = () => {
          const id = el.getAttribute('data-id');
          const s = data.items.find((x) => x.id === id);
          if (s) goSession(a, s);
        };
      });
    } catch (e) { setConn(false); body.innerHTML = '<div class="err">Failed to load sessions.</div>'; }
  }

  const NOTE_TYPES = ['memory','rule','decision','knowledge','task','deal','project','context','contact','finance','note'];

  async function renderMemory() {
    const a = view.agent;
    const body = $('#tabBody');
    const sortBy = view.notesSort || 'created_desc'; // created_desc | updated_desc
    const url = `/api/dashboard/agents/${encodeURIComponent(a.id)}/notes?limit=500` +
      (view.noteType ? `&type=${encodeURIComponent(view.noteType)}` : '');
    try {
      const data = await api(url);
      setConn(true);
      const breakdownMap = Object.fromEntries(data.type_breakdown.map((x) => [x.type, x.c]));
      const filters = ['<button class="note-filter ' + (view.noteType === null ? 'active' : '') + '" data-t="">All</button>']
        .concat(NOTE_TYPES.filter((t) => breakdownMap[t]).map((t) =>
          `<button class="note-filter ${view.noteType === t ? 'active' : ''}" data-t="${t}">${t} <span style="opacity:.6">· ${breakdownMap[t]}</span></button>`
        )).join('');

      // Client-side sort
      const sorted = data.items.slice().sort((x, y) => {
        const k = sortBy === 'updated_desc' ? 'updated_at' : 'created_at';
        return (y[k] || '').localeCompare(x[k] || '');
      });

      const sortToggle = `
        <div style="display:flex; justify-content:flex-end; gap: 6px; margin-bottom: 12px;">
          <button class="note-filter ${sortBy === 'created_desc' ? 'active' : ''}" data-sort="created_desc">Newest created</button>
          <button class="note-filter ${sortBy === 'updated_desc' ? 'active' : ''}" data-sort="updated_desc">Recently updated</button>
        </div>`;

      const items = sorted.length ? sorted.map((n) => `
        <div class="note t-${esc(n.type)}">
          <div class="note-head">
            <span class="note-type">${esc(n.type)}</span>
            <span>${fmtTimeFull(n.created_at)}</span>
            ${n.updated_at && n.updated_at !== n.created_at ? `<span>· upd ${fmtTime(n.updated_at)}</span>` : ''}
            <span style="flex:1"></span>
            <span class="copyable" style="font-family: var(--mono); opacity: .55" data-copy="${esc(n.id)}" title="click to copy">${esc(n.id.slice(0, 12))}</span>
          </div>
          <div class="note-text">${esc(n.text)}</div>
          ${n.tags && n.tags.length ? '<div class="note-meta">tags: ' + n.tags.map(esc).join(', ') + '</div>' : ''}
        </div>`).join('') : '<div class="empty">No notes matching filter.</div>';

      body.innerHTML = `<div class="note-filters">${filters}</div>${sortToggle}<div class="note-list">${items}</div>`;
      body.querySelectorAll('[data-t]').forEach((el) => {
        el.onclick = () => {
          const t = el.getAttribute('data-t');
          view.noteType = t || null;
          renderMemory();
        };
      });
      body.querySelectorAll('[data-sort]').forEach((el) => {
        el.onclick = () => {
          view.notesSort = el.getAttribute('data-sort');
          renderMemory();
        };
      });
      body.querySelectorAll('.copyable[data-copy]').forEach((el) => {
        el.onclick = (ev) => { ev.stopPropagation(); copyText(el, el.getAttribute('data-copy')); };
      });
    } catch (e) { setConn(false); body.innerHTML = '<div class="err">Failed to load memory.</div>'; }
  }

  async function renderSearch() {
    const a = view.agent;
    const body = $('#tabBody');
    const q = view.searchQuery || '';
    body.innerHTML = `
      <div style="margin-bottom: 16px">
        <input type="text" id="searchInp"
               placeholder="Search across all messages…"
               value="${esc(q)}"
               style="width: 100%; padding: 10px 14px; border-radius: 8px;
                      border: 1px solid var(--border); background: var(--surface);
                      color: var(--text); font-size: .9rem; font-family: var(--font); outline: none;">
      </div>
      <div id="searchResults"></div>`;
    const inp = $('#searchInp');
    inp.focus();
    let debounce;
    inp.addEventListener('input', () => {
      clearTimeout(debounce);
      view.searchQuery = inp.value;
      debounce = setTimeout(doSearch, 300);
    });
    if (q) await doSearch();

    async function doSearch() {
      const results = $('#searchResults');
      const qq = (view.searchQuery || '').trim();
      if (!qq) { results.innerHTML = '<div class="empty">Type to search…</div>'; return; }
      results.innerHTML = '<div class="loading">Searching…</div>';
      try {
        const data = await api(
          `/api/dashboard/agents/${encodeURIComponent(a.id)}/search?q=${encodeURIComponent(qq)}&limit=80`
        );
        setConn(true);
        if (!data.items.length) {
          results.innerHTML = '<div class="empty">Nothing found.</div>';
          return;
        }
        results.innerHTML = '<div class="transcript">' +
          data.items.map((m) => `
            <div class="msg ${esc(m.role)}" data-session="${esc(m.session_id)}">
              <div class="msg-head">
                ${roleIcon(m.role)}
                <span class="msg-role ${esc(m.role)}">${esc(m.role)}</span>
                <span>${fmtTimeFull(m.created_at)}</span>
                <span style="flex:1"></span>
                <span class="copyable" style="font-family:var(--mono); opacity:.55" title="click to copy session_id">${esc(m.session_id.slice(0,16))}…</span>
              </div>
              <div class="msg-content">${esc(m.content)}</div>
            </div>`).join('') + '</div>';
        // wire copyable session_ids
        results.querySelectorAll('.copyable').forEach((el, i) => {
          const sid = data.items[i].session_id;
          el.onclick = (ev) => { ev.stopPropagation(); copyText(el, sid); };
        });
        // click on msg → jump to that session
        results.querySelectorAll('.msg').forEach((el, i) => {
          el.style.cursor = 'pointer';
          el.addEventListener('dblclick', () => {
            const sid = el.getAttribute('data-session');
            goSession(a, { id: sid, title: null });
          });
        });
      } catch (e) { setConn(false); results.innerHTML = '<div class="err">Search failed.</div>'; }
    }
  }

  function roleIcon(role) {
    const map = { user: '👤', assistant: '🤖', tool: '🔧', system: '⚙️' };
    return '<span style="margin-right:4px">' + (map[role] || '•') + '</span>';
  }

  function copyText(el, text) {
    navigator.clipboard.writeText(text).then(() => {
      el.classList.add('flash');
      setTimeout(() => el.classList.remove('flash'), 600);
    });
  }
  window.copyText = copyText;

  async function renderSession() {
    const a = view.agent;
    const s = view.session;
    main.innerHTML = `
      <div class="detail-head">
        <div class="agent-avatar ${avatarClass(a.name)}">${initial(a.name)}</div>
        <div style="flex:1; min-width:0">
          <div class="detail-title">${esc(s.title || '(untitled session)')}</div>
          <div class="detail-sub" style="font-family: var(--mono)">
            <span class="copyable" id="sidCopy" title="click to copy">${esc(s.id)}</span>
          </div>
        </div>
      </div>
      <div id="tabBody"><div class="loading">Loading transcript…</div></div>`;
    const sidEl = $('#sidCopy');
    if (sidEl) sidEl.onclick = () => copyText(sidEl, s.id);
    const body = $('#tabBody');
    try {
      const data = await api(`/api/dashboard/sessions/${encodeURIComponent(s.id)}/messages?limit=1000`);
      setConn(true);
      if (!data.messages.length) {
        body.innerHTML = '<div class="empty">No messages.</div>';
        return;
      }
      body.innerHTML = '<div class="transcript">' +
        data.messages.map((m) => `
          <div class="msg ${esc(m.role)}">
            <div class="msg-head">
              ${roleIcon(m.role)}
              <span class="msg-role ${esc(m.role)}">${esc(m.role)}</span>
              <span>${fmtTimeFull(m.created_at)}</span>
              ${m.token_count != null ? `<span>· ${m.token_count} tok</span>` : ''}
            </div>
            <div class="msg-content">${esc(m.content)}</div>
          </div>`).join('') + '</div>';
    } catch (e) { setConn(false); body.innerHTML = '<div class="err">Failed to load transcript.</div>'; }
  }

  // ---- Boot ----
  // Probe the API to see whether a session cookie is present and valid.
  // 200 → cookie ok, show the app. 401 → no/expired cookie, show login.
  fetch(BASE + '/api/dashboard/agents', { credentials: 'same-origin' })
    .then(r => {
      if (r.ok) {
        showApp();
        goHome();
      } else {
        showLogin();
      }
    })
    .catch(() => showLogin());
})();
</script>
</body>
</html>
