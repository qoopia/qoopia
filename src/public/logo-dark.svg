<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 80" width="420" height="80">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B1D3A"/>
      <stop offset="100%" stop-color="#1a3a5c"/>
    </linearGradient>
  </defs>

  <!-- Gradient background matching the card -->
  <rect width="420" height="80" rx="12" fill="url(#bg)"/>

  <!-- Pyramid layers — centered vertically -->
  <g transform="translate(48, 40)">
    <rect x="-7.5" y="-15" width="15" height="5" rx="2.5" fill="#ffffff"/>
    <rect x="-12" y="-7.5" width="24" height="5" rx="2.5" fill="rgba(255,255,255,0.75)"/>
    <rect x="-16" y="0" width="32" height="5" rx="2.5" fill="rgba(255,255,255,0.5)"/>
    <rect x="-20.5" y="7.5" width="41" height="5" rx="2.5" fill="rgba(255,255,255,0.3)"/>
    <rect x="-24.5" y="15" width="49" height="5" rx="2.5" fill="rgba(255,255,255,0.15)"/>
  </g>

  <!-- Wordmark -->
  <text x="96" y="48" font-family="JetBrains Mono, monospace" font-weight="300" font-size="30" fill="#ffffff" letter-spacing="3">qoopia</text>
</svg>